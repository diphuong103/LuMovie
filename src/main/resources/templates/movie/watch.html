<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="'Xem: ' + ${movie.title} + ' — LuMovie'">Xem Phim — LuMovie</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="page-wrapper" style="background:#000">

  <!-- Breadcrumb -->
  <div style="padding:16px 48px;background:#0a0a0e;border-bottom:1px solid rgba(200,146,42,0.08)">
    <div class="breadcrumb">
      <a th:href="@{/}">🏠 Trang Chủ</a>
      <span class="breadcrumb-sep">›</span>
      <a th:href="@{/movies}" >Phim</a>
      <span class="breadcrumb-sep">›</span>
      <a th:href="@{/movies/{slug}(slug=${movie.slug})}" th:text="${movie.title}">Tên Phim</a>
      <span class="breadcrumb-sep">›</span>
      <span class="breadcrumb-current" th:text="${currentEpisode != null ? 'Tập ' + currentEpisode.episodeNumber : 'Xem Phim'}">Xem Phim</span>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 360px;min-height:calc(100vh - 130px)">

    <!-- ── VIDEO AREA ── -->
    <div style="padding:0;background:#000">

      <!-- Player -->
      <div class="player-wrapper" style="border-radius:0;background:#000">
        <video id="mainPlayer" controls autoplay
               style="width:100%;max-height:70vh;background:#000;display:block"
               th:src="${currentEpisode != null ? currentEpisode.videoUrl : movie.videoUrl}"
               preload="auto">
          Trình duyệt của bạn không hỗ trợ video.
        </video>

        <!-- Custom overlay controls (optional enhancement) -->
        <div id="videoOverlay" style="
          position:absolute;inset:0;display:none;
          align-items:center;justify-content:center;
          background:rgba(0,0,0,0.5)">
          <button onclick="document.getElementById('mainPlayer').play()"
                  style="width:64px;height:64px;border-radius:50%;
                         background:linear-gradient(135deg,#c8922a,#e8b84b);
                         border:none;color:#0a0a0e;font-size:1.4rem;cursor:pointer">▶</button>
        </div>
      </div>

      <!-- Video info bar -->
      <div style="padding:16px 24px;background:#0a0a0e;border-bottom:1px solid rgba(200,146,42,0.08);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
        <div>
          <h2 style="font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:3px;color:#e8b84b"
              th:text="${movie.title}">Tên Phim</h2>
          <p style="font-size:0.78rem;color:#605848;margin-top:2px"
             th:text="${currentEpisode != null ? 'Tập ' + currentEpisode.episodeNumber + (currentEpisode.title != null ? ' — ' + currentEpisode.title : '') : 'Phim Lẻ'}">Tập 1</p>
        </div>
        <div style="display:flex;gap:10px;align-items:center">
          <!-- Prev episode -->
          <a th:if="${prevEpisode != null}"
             th:href="@{/movies/{slug}/watch(slug=${movie.slug}, ep=${prevEpisode.episodeNumber})}"
             class="btn btn-ghost btn-sm">‹ Tập Trước</a>
          <!-- Next episode -->
          <a th:if="${nextEpisode != null}"
             th:href="@{/movies/{slug}/watch(slug=${movie.slug}, ep=${nextEpisode.episodeNumber})}"
             class="btn btn-gold btn-sm">Tập Sau ›</a>
          <!-- Back to detail -->
          <a th:href="@{/movies/{slug}(slug=${movie.slug})}" class="btn btn-ghost btn-sm">📋 Chi Tiết</a>
        </div>
      </div>

      <!-- Episode grid (series/anime) -->
      <div th:if="${movie.type != 'MOVIE' and !movie.episodes.empty}"
           style="padding:20px 24px;background:#0a0a0e">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:0.9rem;letter-spacing:3px;color:#e8b84b;margin-bottom:14px">📺 Chọn Tập</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(48px,1fr));gap:6px">
          <a th:each="episode : ${movie.episodes}"
             th:href="@{/movies/{slug}/watch(slug=${movie.slug}, ep=${episode.episodeNumber})}"
             th:text="${episode.episodeNumber}"
             th:style="${episode.episodeNumber == currentEpisode?.episodeNumber} ?
               'background:linear-gradient(135deg,#c8922a,#e8b84b);border-color:transparent;color:#0a0a0e;font-weight:700' :
               'background:#141419;border-color:rgba(200,146,42,0.15);color:#a09880'"
             style="
               aspect-ratio:1;display:flex;align-items:center;justify-content:center;
               border-radius:8px;font-size:0.82rem;
               border:1px solid;transition:all 0.15s;text-decoration:none;font-family:'DM Sans',sans-serif;"
             onmouseover="if(!this.style.background.includes('gradient'))this.style.background='rgba(200,146,42,0.12)'"
             onmouseout="if(!this.style.background.includes('gradient'))this.style.background='#141419'">1</a>
        </div>
      </div>

      <!-- Comment section -->
      <div style="padding:24px;background:#0a0a0e">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:3px;color:#e8b84b;margin-bottom:16px">💬 Bình Luận</div>

        <!-- Form -->
        <div sec:authorize="isAuthenticated()" style="margin-bottom:20px">
          <form th:action="@{/movies/{id}/comment(id=${movie.id})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div style="display:flex;gap:10px;align-items:flex-start">
              <div class="comment-avatar" sec:authentication="principal.username"
                   style="font-size:0.8rem">U</div>
              <div style="flex:1">
                <textarea name="content" class="form-input" rows="2"
                          placeholder="Nhận xét về phim này..." style="resize:none;margin-bottom:8px"></textarea>
                <button type="submit" class="btn btn-gold btn-sm">Gửi</button>
              </div>
            </div>
          </form>
        </div>
        <div sec:authorize="isAnonymous()" style="margin-bottom:20px;text-align:center;padding:14px;background:#141419;border-radius:10px">
          <a th:href="@{/auth/login}" style="color:#e8b84b">Đăng nhập</a>
          <span style="color:#605848;font-size:0.84rem"> để bình luận</span>
        </div>

        <!-- Comments -->
        <div th:each="comment : ${comments}" class="comment-item">
          <div class="comment-avatar" th:text="${#strings.substring(comment.user.username,0,1).toUpperCase()}">U</div>
          <div>
            <div style="display:flex;gap:10px;align-items:baseline">
              <span class="comment-name" th:text="${comment.user.username}">User</span>
              <span class="comment-time" th:text="${#temporals.format(comment.createdAt,'dd/MM/yyyy HH:mm')}">01/01</span>
            </div>
            <p class="comment-text" th:text="${comment.content}">Nội dung</p>
          </div>
        </div>
      </div>
    </div>

    <!-- ── RIGHT SIDEBAR ── -->
    <aside style="background:#0a0a0e;border-left:1px solid rgba(200,146,42,0.08);padding:20px;overflow-y:auto;max-height:calc(100vh - 130px);position:sticky;top:64px">

      <!-- Movie poster + info -->
      <div style="display:flex;gap:12px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid rgba(200,146,42,0.1)">
        <div style="width:70px;height:105px;border-radius:8px;overflow:hidden;flex-shrink:0;border:1px solid rgba(200,146,42,0.2)">
          <img th:if="${movie.posterUrl != null}" th:src="${movie.posterUrl}" style="width:100%;height:100%;object-fit:cover"/>
          <div th:unless="${movie.posterUrl != null}" style="width:100%;height:100%;background:#1a1a22;display:flex;align-items:center;justify-content:center">🎬</div>
        </div>
        <div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;color:#e8b84b;line-height:1.2;margin-bottom:6px" th:text="${movie.title}">Tên Phim</div>
          <div style="font-size:0.75rem;color:#605848;margin-bottom:4px" th:text="${movie.releaseYear}">2024</div>
          <div style="font-size:0.75rem;color:#e8b84b">⭐ <span th:text="${#numbers.formatDecimal(movie.avgRating,1,1)}">8.5</span></div>
          <a th:href="@{/movies/{slug}(slug=${movie.slug})}" style="display:inline-block;margin-top:8px;font-size:0.72rem;color:#605848;text-decoration:none;border:1px solid rgba(200,146,42,0.2);padding:3px 10px;border-radius:4px">Xem Chi Tiết</a>
        </div>
      </div>

      <!-- Recommended -->
      <div style="font-family:'Bebas Neue',sans-serif;font-size:0.85rem;letter-spacing:3px;color:#e8b84b;margin-bottom:14px">🎬 Xem Tiếp</div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <a th:each="rec : ${recommended}"
           th:href="@{/movies/{slug}/watch(slug=${rec.slug})}"
           style="display:flex;gap:10px;align-items:center;text-decoration:none;padding:8px;border-radius:8px;transition:background 0.15s"
           onmouseover="this.style.background='rgba(200,146,42,0.05)'"
           onmouseout="this.style.background=''">
          <div style="width:64px;height:96px;border-radius:6px;overflow:hidden;flex-shrink:0;background:#141419">
            <img th:if="${rec.posterUrl != null}" th:src="${rec.posterUrl}" style="width:100%;height:100%;object-fit:cover"/>
            <div th:unless="${rec.posterUrl != null}" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:1.3rem">🎬</div>
          </div>
          <div style="flex:1;min-width:0">
            <div style="font-size:0.8rem;font-weight:600;color:#e8e0d0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px" th:text="${rec.title}">Phim</div>
            <div style="font-size:0.7rem;color:#605848;margin-bottom:3px" th:text="${rec.releaseYear}">2024</div>
            <div style="font-size:0.7rem;color:#e8b84b">⭐ <span th:text="${#numbers.formatDecimal(rec.avgRating,1,1)}">8.0</span></div>
          </div>
        </a>
      </div>
    </aside>
  </div>
</div>

<script th:src="@{/js/player.js}"></script>
</body>
</html>
