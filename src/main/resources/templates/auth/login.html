<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đăng Nhập — LuMovie</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<!-- Full screen auth layout -->
<div class="auth-layout">

  <!-- LEFT — Cinematic panel -->
  <div class="auth-left" style="
    position:relative;overflow:hidden;
    background:
      linear-gradient(135deg, rgba(10,10,14,0.92) 0%, rgba(10,26,46,0.92) 40%, rgba(26,10,46,0.92) 100%),
      url('/images/bg_log.jpg');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:60px;text-align:center">

    <!-- Glow -->
    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      width:600px;height:600px;border-radius:50%;
      background:radial-gradient(ellipse,rgba(200,146,42,0.08) 0%,transparent 65%);
      pointer-events:none"></div>

    <a th:href="@{/}" style="position:relative;z-index:1">
      <div style="
        font-family:'Bebas Neue',sans-serif;font-size:4rem;letter-spacing:8px;
        background:linear-gradient(180deg,#fdeaa8,#f5d280,#e8b84b,rgba(200,146,42,0.6));
        -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
        line-height:1;margin-bottom:16px">LUMOVIE</div>
    </a>

    <p style="position:relative;z-index:1;font-family:'Crimson Pro',serif;font-style:italic;
              font-size:1.1rem;color:#605848;max-width:320px;line-height:1.6">
      Hàng nghìn bộ phim &amp; anime<br>chất lượng cao, miễn phí
    </p>


    <!-- Decorative film strip bottom -->
    <div style="position:absolute;bottom:0;left:0;right:0;height:3px;
      background:linear-gradient(90deg,transparent,rgba(200,146,42,0.4),rgba(200,146,42,0.8),rgba(200,146,42,0.4),transparent)"></div>
  </div>

  <!-- RIGHT — Login form -->
  <div class="auth-right" style="
    background:#0a0a0e;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:60px 80px;position:relative">

    <!-- Back link -->
    <a th:href="@{/}" style="position:absolute;top:28px;left:28px;display:flex;align-items:center;gap:6px;font-size:0.8rem;color:#605848;text-decoration:none;transition:color 0.2s"
       onmouseover="this.style.color='#e8b84b'" onmouseout="this.style.color='#605848'">
      ← Về Trang Chủ
    </a>

    <div style="width:100%;max-width:400px">

      <!-- Header -->
      <div style="margin-bottom:36px">
        <h1 style="font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:4px;color:#e8b84b;margin-bottom:6px">ĐĂNG NHẬP</h1>
        <p style="font-size:0.85rem;color:#605848">Chào mừng trở lại! Đăng nhập để tiếp tục xem phim.</p>
      </div>

      <!-- Error message -->
      <div th:if="${error}" class="alert alert-error" style="margin-bottom:20px">
        ⚠️ <span th:text="${error}">Sai tên đăng nhập hoặc mật khẩu</span>
      </div>

      <!-- Success message -->
      <div th:if="${success}" class="alert alert-success" style="margin-bottom:20px">
        ✅ <span th:text="${success}">Đăng ký thành công! Hãy đăng nhập.</span>
      </div>

      <form id="loginForm">
        <input type="hidden" id="csrfToken"
               th:if="${_csrf != null}"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}" />

        <div class="form-group">
          <label class="form-label" for="username">Tên đăng nhập / Email</label>
          <input type="text" id="username" name="username" class="form-input"
                 placeholder="Nhập email hoặc username" required/>
        </div>

        <div class="form-group">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <label class="form-label" for="password">Mật Khẩu</label>
            <a href="#" style="font-size:0.75rem;color:#605848;text-decoration:none;">Quên mật khẩu?</a>
          </div>
          <div style="position:relative">
            <input type="password" id="password" name="password" class="form-input"
                   placeholder="Nhập mật khẩu" required style="padding-right:44px"/>
            <button type="button" onclick="togglePassword('password')"
                    style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#605848;cursor:pointer;">👁</button>
          </div>
        </div>

        <button type="submit" class="btn btn-gold w-full btn-lg" style="justify-content:center;margin-bottom:16px">
          Đăng Nhập
        </button>
      </form>

      <!-- Divider -->
      <div style="display:flex;align-items:center;gap:12px;margin:20px 0">
        <div style="flex:1;height:1px;background:rgba(200,146,42,0.1)"></div>
        <span style="font-size:0.75rem;color:#605848">hoặc</span>
        <div style="flex:1;height:1px;background:rgba(200,146,42,0.1)"></div>
      </div>

      <!-- OAuth buttons -->
      <a th:href="@{/oauth2/authorization/google}"
         style="
           display:flex;align-items:center;justify-content:center;gap:10px;
           width:100%;padding:11px;border-radius:40px;
           background:#141419;border:1px solid rgba(255,255,255,0.1);
           color:#e8e0d0;font-size:0.87rem;font-weight:500;
           text-decoration:none;transition:all 0.2s;margin-bottom:10px"
         onmouseover="this.style.borderColor='rgba(200,146,42,0.3)'"
         onmouseout="this.style.borderColor='rgba(255,255,255,0.1)'">
        <span style="font-size:1.1rem">🌐</span> Đăng nhập với Google
      </a>

      <!-- Register link -->
      <p style="text-align:center;font-size:0.83rem;color:#605848;margin-top:24px">
        Chưa có tài khoản?
        <a th:href="@{/auth/register}" style="color:#e8b84b;font-weight:600;text-decoration:none">Đăng Ký Ngay</a>
      </p>
    </div>
  </div>
</div>

<script>
function togglePassword(id) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
}
</script>

<script>
  document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;

    try {
      const res = await fetch("/api/auth/login", { // Kiểm tra kỹ đường dẫn này
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();

      if (res.ok) {
        const token = data.accessToken || data.data.accessToken;
        // Lưu vào Cookie thay vì localStorage (hết hạn sau 1 ngày)
        document.cookie = `accessToken=${token}; path=/; max-age=86400; SameSite=Strict`;

        window.location.href = "/";
      }else {
        alert(data.message || "Đăng nhập thất bại!");
      }
    } catch (error) {
      console.error("Lỗi kết nối:", error);
      alert("Không thể kết nối đến máy chủ!");
    }
  });

  function togglePassword(id) {
    const el = document.getElementById(id);
    el.type = el.type === 'password' ? 'text' : 'password';
  }
</script>

</body>
</html>
