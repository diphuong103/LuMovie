<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đăng Ký — LuMovie</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div style="min-height:100vh;display:grid;grid-template-columns:1fr 1fr">

  <!-- LEFT panel — same as login -->
  <div style="
    position:relative;overflow:hidden;
    background:linear-gradient(135deg,#0a0a0e 0%,#0a1a2e 40%,#1a0a2e 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:60px;text-align:center">
    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      width:600px;height:600px;border-radius:50%;
      background:radial-gradient(ellipse,rgba(200,146,42,0.07) 0%,transparent 65%);pointer-events:none"></div>

    <a th:href="@{/}" style="position:relative;z-index:1">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:4rem;letter-spacing:8px;
        background:linear-gradient(180deg,#fdeaa8,#f5d280,#e8b84b,rgba(200,146,42,0.6));
        -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
        line-height:1;margin-bottom:16px">LUMOVIE</div>
    </a>
    <p style="position:relative;z-index:1;font-family:'Crimson Pro',serif;font-style:italic;
              font-size:1.1rem;color:#605848;line-height:1.6">
      Tạo tài khoản miễn phí<br>và bắt đầu xem ngay hôm nay
    </p>

    <!-- Steps -->
    <div style="position:relative;z-index:1;margin-top:48px;display:flex;flex-direction:column;gap:16px;width:100%;max-width:280px">
      <div th:each="step,stat : ${ {'Tạo tài khoản miễn phí', 'Tìm kiếm phim yêu thích', 'Lưu &amp; theo dõi watchlist', 'Đánh giá &amp; bình luận'} }"
           style="display:flex;align-items:center;gap:12px">
        <div th:text="${stat.index + 1}"
             style="width:28px;height:28px;border-radius:50%;
                    background:linear-gradient(135deg,#c8922a,#e8b84b);
                    display:flex;align-items:center;justify-content:center;
                    font-size:0.72rem;font-weight:700;color:#0a0a0e;flex-shrink:0">1</div>
        <span style="font-size:0.83rem;color:#a09880" th:text="${step}">Step</span>
      </div>
    </div>

    <div style="position:absolute;bottom:0;left:0;right:0;height:3px;
      background:linear-gradient(90deg,transparent,rgba(200,146,42,0.4),rgba(200,146,42,0.8),rgba(200,146,42,0.4),transparent)"></div>
  </div>

  <!-- RIGHT — Register form -->
  <div style="background:#0a0a0e;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 80px;position:relative;overflow-y:auto">
    <a th:href="@{/}" style="position:absolute;top:28px;left:28px;display:flex;align-items:center;gap:6px;font-size:0.8rem;color:#605848;text-decoration:none;transition:color 0.2s"
       onmouseover="this.style.color='#e8b84b'" onmouseout="this.style.color='#605848'">← Về Trang Chủ</a>

    <div style="width:100%;max-width:400px">
      <div style="margin-bottom:32px">
        <h1 style="font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:4px;color:#e8b84b;margin-bottom:6px">ĐĂNG KÝ</h1>
        <p style="font-size:0.85rem;color:#605848">Hoàn toàn miễn phí — không cần thẻ tín dụng</p>
      </div>

      <!-- Errors -->
      <div th:if="${error}" class="alert alert-error" style="margin-bottom:20px">⚠️ <span th:text="${error}">Lỗi</span></div>

      <form th:action="@{/auth/register}" method="post" id="registerForm">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <!-- Username -->
        <div class="form-group">
          <label class="form-label">Tên đăng nhập</label>
          <input type="text" name="username" class="form-input" id="username"
                 placeholder="Ít nhất 3 ký tự, không dấu cách"
                 th:value="${registerRequest?.username}"
                 th:classappend="${usernameError != null} ? ' error'"
                 minlength="3" maxlength="30" required/>
          <div th:if="${usernameError}" class="form-error" th:text="${usernameError}">Lỗi</div>
          <div id="usernameHint" class="form-hint" style="display:none">✅ Tên đăng nhập hợp lệ</div>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-input" id="email"
                 placeholder="example@email.com"
                 th:value="${registerRequest?.email}"
                 th:classappend="${emailError != null} ? ' error'"
                 required/>
          <div th:if="${emailError}" class="form-error" th:text="${emailError}">Lỗi email</div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label">Mật khẩu</label>
          <div style="position:relative">
            <input type="password" name="password" class="form-input" id="password"
                   placeholder="Ít nhất 6 ký tự"
                   th:classappend="${passwordError != null} ? ' error'"
                   minlength="6" required style="padding-right:44px"/>
            <button type="button" onclick="togglePassword('password')"
                    style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#605848;cursor:pointer;font-size:1rem">👁</button>
          </div>
          <div th:if="${passwordError}" class="form-error" th:text="${passwordError}">Lỗi mật khẩu</div>
          <!-- Strength indicator -->
          <div id="strengthBar" style="display:flex;gap:3px;margin-top:8px">
            <div id="s1" style="height:3px;flex:1;border-radius:2px;background:#202028;transition:background 0.3s"></div>
            <div id="s2" style="height:3px;flex:1;border-radius:2px;background:#202028;transition:background 0.3s"></div>
            <div id="s3" style="height:3px;flex:1;border-radius:2px;background:#202028;transition:background 0.3s"></div>
            <div id="s4" style="height:3px;flex:1;border-radius:2px;background:#202028;transition:background 0.3s"></div>
          </div>
          <div id="strengthText" style="font-size:0.72rem;color:#605848;margin-top:4px"></div>
        </div>

        <!-- Confirm password -->
        <div class="form-group">
          <label class="form-label">Xác nhận mật khẩu</label>
          <div style="position:relative">
            <input type="password" name="confirmPassword" class="form-input" id="confirmPassword"
                   placeholder="Nhập lại mật khẩu"
                   required style="padding-right:44px"/>
            <button type="button" onclick="togglePassword('confirmPassword')"
                    style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#605848;cursor:pointer;font-size:1rem">👁</button>
          </div>
          <div id="matchError" class="form-error" style="display:none">⚠️ Mật khẩu không khớp</div>
        </div>

        <!-- Terms -->
        <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:24px">
          <input type="checkbox" id="terms" name="terms" required
                 style="width:16px;height:16px;accent-color:#e8b84b;cursor:pointer;margin-top:2px;flex-shrink:0"/>
          <label for="terms" style="font-size:0.8rem;color:#605848;cursor:pointer;line-height:1.5">
            Tôi đồng ý với <a href="#" style="color:#e8b84b">Điều Khoản Sử Dụng</a> và <a href="#" style="color:#e8b84b">Chính Sách Bảo Mật</a> của LuMovie
          </label>
        </div>

        <button type="submit" class="btn btn-gold w-full btn-lg" style="justify-content:center;margin-bottom:16px">
          Tạo Tài Khoản
        </button>
      </form>

      <!-- Divider -->
      <div style="display:flex;align-items:center;gap:12px;margin:16px 0">
        <div style="flex:1;height:1px;background:rgba(200,146,42,0.1)"></div>
        <span style="font-size:0.75rem;color:#605848">hoặc</span>
        <div style="flex:1;height:1px;background:rgba(200,146,42,0.1)"></div>
      </div>

      <!-- OAuth -->
      <a th:href="@{/oauth2/authorization/google}"
         style="display:flex;align-items:center;justify-content:center;gap:10px;
                width:100%;padding:11px;border-radius:40px;
                background:#141419;border:1px solid rgba(255,255,255,0.1);
                color:#e8e0d0;font-size:0.87rem;font-weight:500;
                text-decoration:none;transition:all 0.2s"
         onmouseover="this.style.borderColor='rgba(200,146,42,0.3)'"
         onmouseout="this.style.borderColor='rgba(255,255,255,0.1)'">
        <span style="font-size:1.1rem">🌐</span> Đăng ký với Google
      </a>

      <p style="text-align:center;font-size:0.83rem;color:#605848;margin-top:24px">
        Đã có tài khoản? <a th:href="@{/auth/login}" style="color:#e8b84b;font-weight:600;text-decoration:none">Đăng Nhập</a>
      </p>
    </div>
  </div>
</div>

<script>
function togglePassword(id) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
}

// Password strength
document.getElementById('password').addEventListener('input', function() {
  const v = this.value;
  const bars = [document.getElementById('s1'),document.getElementById('s2'),
                document.getElementById('s3'),document.getElementById('s4')];
  const txt = document.getElementById('strengthText');
  let score = 0;
  if (v.length >= 6) score++;
  if (v.length >= 10) score++;
  if (/[A-Z]/.test(v) && /[0-9]/.test(v)) score++;
  if (/[^A-Za-z0-9]/.test(v)) score++;
  const colors = ['','#e84055','#f59e0b','#e8b84b','#28d878'];
  const labels = ['','Yếu','Trung bình','Khá mạnh','Mạnh'];
  bars.forEach((b,i) => b.style.background = i < score ? colors[score] : '#202028');
  txt.textContent = score > 0 ? 'Độ mạnh: ' + labels[score] : '';
  txt.style.color = colors[score] || '#605848';
});

// Confirm password match
document.getElementById('confirmPassword').addEventListener('input', function() {
  const err = document.getElementById('matchError');
  const pass = document.getElementById('password').value;
  err.style.display = (this.value && this.value !== pass) ? 'block' : 'none';
});

// Prevent submit if passwords don't match
document.getElementById('registerForm').addEventListener('submit', function(e) {
  const p = document.getElementById('password').value;
  const c = document.getElementById('confirmPassword').value;
  if (p !== c) { e.preventDefault(); document.getElementById('matchError').style.display = 'block'; }
});
</script>
</body>
</html>
