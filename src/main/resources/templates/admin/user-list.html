<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quản Lý User — Admin</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="page-wrapper">
  <div class="admin-layout">
    <div th:replace="~{fragments/sidebar :: sidebar}" th:with="adminPage='users'"></div>

    <main class="admin-content">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:16px">
        <div>
          <h1 style="font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:4px;color:#e8b84b">QUẢN LÝ USER</h1>
          <p style="font-size:0.83rem;color:#605848"
             th:text="${users.totalElements} + ' người dùng'">0 người dùng</p>
        </div>

        <!-- Search form -->
        <form th:action="@{/admin/users}" method="get">
          <div class="search-bar" style="min-width:280px">
            <input type="text" name="q" th:value="${param.q}" placeholder="Tìm kiếm user..."/>
            <button type="submit" class="btn btn-gold btn-sm">Tìm</button>
          </div>
        </form>
      </div>

      <!-- Filter tabs -->
      <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">
        <a th:href="@{/admin/users}" class="btn btn-sm"
           th:classappend="${param.role == null} ? ' btn-gold' : ' btn-ghost'">Tất Cả</a>
        <a th:href="@{/admin/users(role='ROLE_USER')}" class="btn btn-sm"
           th:classappend="${param.role == 'ROLE_USER'} ? ' btn-gold' : ' btn-ghost'">👤 User</a>
        <a th:href="@{/admin/users(role='ROLE_VIP')}" class="btn btn-sm"
           th:classappend="${param.role == 'ROLE_VIP'} ? ' btn-gold' : ' btn-ghost'">👑 VIP</a>
        <a th:href="@{/admin/users(role='ROLE_ADMIN')}" class="btn btn-sm"
           th:classappend="${param.role == 'ROLE_ADMIN'} ? ' btn-gold' : ' btn-ghost'">⚙️ Admin</a>
      </div>

      <div class="card">
        <div style="overflow-x:auto">
          <table class="data-table">
            <thead>
              <tr>
                <th>Người Dùng</th>
                <th>Email</th>
                <th>Vai Trò</th>
                <th>Đăng Ký</th>
                <th>Đăng Nhập Gần Nhất</th>
                <th>Trạng Thái</th>
                <th>Thao Tác</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="user : ${users.content}">
                <td>
                  <div style="display:flex;align-items:center;gap:10px">
                    <div style="width:36px;height:36px;border-radius:50%;
                                background:linear-gradient(135deg,#c8922a,#e8b84b);
                                display:flex;align-items:center;justify-content:center;
                                font-weight:700;font-size:0.85rem;color:#0a0a0e;flex-shrink:0"
                         th:text="${#strings.substring(user.username,0,1).toUpperCase()}">U</div>
                    <div>
                      <div style="font-weight:600;font-size:0.85rem" th:text="${user.username}">Username</div>
                      <div style="font-size:0.7rem;color:#605848" th:if="${user.fullName}" th:text="${user.fullName}">Full name</div>
                    </div>
                  </div>
                </td>
                <td style="color:#a09880;font-size:0.83rem" th:text="${user.email}">email@</td>
                <td>
                  <span th:if="${user.role.name() == 'ROLE_ADMIN'}" class="badge badge-purple">⚙️ Admin</span>
                  <span th:if="${user.role.name() == 'ROLE_VIP'}" class="badge badge-gold">👑 VIP</span>
                  <span th:if="${user.role.name() == 'ROLE_USER'}" class="badge" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#605848">👤 User</span>
                </td>
                <td style="color:#605848;font-size:0.8rem" th:text="${#temporals.format(user.createdAt,'dd/MM/yyyy')}">01/01</td>
                <td style="color:#605848;font-size:0.8rem" th:text="${user.lastLoginAt != null ? #temporals.format(user.lastLoginAt,'dd/MM/yyyy HH:mm') : '—'}">—</td>
                <td>
                  <span th:if="${user.enabled}" class="badge badge-green">✅ Hoạt Động</span>
                  <span th:unless="${user.enabled}" class="badge badge-red">🚫 Đã Khóa</span>
                </td>
                <td>
                  <div style="display:flex;gap:6px">
                    <!-- Toggle role -->
                    <form th:action="@{/admin/users/{id}/toggle-role(id=${user.id})}" method="post" style="display:inline">
                      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                      <button type="submit"
                              title="Đổi vai trò"
                              style="padding:4px 10px;border-radius:4px;background:rgba(200,146,42,0.1);border:1px solid rgba(200,146,42,0.2);color:#e8b84b;font-size:0.72rem;cursor:pointer">
                        <span th:text="${user.role.name() == 'ROLE_USER' ? '👑' : '👤'}">👑</span>
                      </button>
                    </form>
                    <!-- Toggle lock -->
                    <form th:action="@{/admin/users/{id}/toggle-status(id=${user.id})}" method="post" style="display:inline">
                      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                      <button type="submit"
                              style="padding:4px 10px;border-radius:4px;cursor:pointer;font-size:0.72rem;
                                     background:rgba(232,64,85,0.1);border:1px solid rgba(232,64,85,0.2);color:#e84055"
                              th:text="${user.enabled ? '🔒' : '🔓'}">🔒</button>
                    </form>
                  </div>
                </td>
              </tr>
              <tr th:if="${users.empty}">
                <td colspan="7" style="text-align:center;padding:40px;color:#605848">Không tìm thấy user nào</td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- Pagination -->
        <div class="pagination" style="margin-top:24px">
          <a th:if="${users.hasPreviousPage()}"
             th:href="@{/admin/users(page=${users.number-1},q=${param.q},role=${param.role})}"
             class="page-btn">‹</a>
          <a th:each="i : ${#numbers.sequence(0,users.totalPages-1)}"
             th:if="${i >= users.number - 2 and i <= users.number + 2}"
             th:href="@{/admin/users(page=${i},q=${param.q},role=${param.role})}"
             class="page-btn" th:classappend="${i == users.number} ? ' active'"
             th:text="${i+1}">1</a>
          <a th:if="${users.hasNextPage()}"
             th:href="@{/admin/users(page=${users.number+1},q=${param.q},role=${param.role})}"
             class="page-btn">›</a>
        </div>
      </div>
    </main>
  </div>
</div>
</body>
</html>
